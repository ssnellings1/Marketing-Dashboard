<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — PI Marketing Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; width: 100%; max-width: 420px; }
  </style>
</head>
<body>
  <div class="login-card p-5 shadow-lg">
    <div class="text-center mb-4">
      <i class="bi bi-bar-chart-fill text-primary" style="font-size:2.5rem"></i>
      <h4 class="text-white mt-2 mb-0 fw-bold">PI Marketing Dashboard</h4>
      <p class="text-secondary small mt-1">Sign in to your account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}" />
      <div class="mb-3">
        <label class="form-label text-secondary small">Username</label>
        <input type="text" name="username" class="form-control bg-dark border-secondary text-white"
               placeholder="username" required autofocus />
      </div>
      <div class="mb-4">
        <label class="form-label text-secondary small">Password</label>
        <input type="password" name="password" class="form-control bg-dark border-secondary text-white"
               placeholder="••••••••" required />
      </div>
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" name="remember" id="remember" />
        <label class="form-check-label text-secondary small" for="remember">Keep me logged in</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
